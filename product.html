<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- Open Graph / WhatsApp Preview Tags -->
    <meta property="og:title" content="Bayna - The Unified Marketplace" />
    <meta property="og:description" content="Bayna : Buy • Sell • Book Services" />
    <meta property="og:image" content="https://contehsaidue.github.io/makit-legal/assets/bayna-white-logo.png" />
    <meta property="og:url" content="https://contehsaidue.github.io/makit-legal/product.html?id=PRODUCT_ID" />
    <meta property="og:type" content="product" />
    <meta property="og:site_name" content="Bayna Marketplace" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bayna Product" />
    <meta name="twitter:description" content="Shop products in Sierra Leone" />
    <meta name="twitter:image" content="https://contehsaidue.github.io/makit-legal/assets/bayna-white-logo.png" />
    
    <title>Bayna - Product Details</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f7fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-align: center;
        }
        
        .image-container {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: relative;
        }
        
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .default-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
        }
        
        .content {
            padding: 24px;
        }
        
        .product-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        
        .product-price {
            font-size: 28px;
            font-weight: 700;
            color: #4CAF50;
            margin-bottom: 8px;
        }
        
        .product-rating {
            color: #6B7280;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        .star {
            color: #FFD700;
            font-size: 18px;
        }
        
        .stock-status {
            margin-bottom: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
        }
        
        .in-stock {
            background: #D1FAE5;
            color: #065F46;
        }
        
        .out-of-stock {
            background: #FEE2E2;
            color: #991B1B;
        }
        
        .open-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 16px;
            transition: background 0.3s;
        }
        
        .open-button:hover {
            background: #45a049;
        }
        
        .download-button {
            background: #2563EB;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .download-button:hover {
            background: #1D4ED8;
        }
        
        .footer {
            background: #F9FAFB;
            padding: 20px;
            font-size: 12px;
            color: #6B7280;
            border-top: 1px solid #E5E7EB;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6B7280;
        }
        
        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #EF4444;
        }
        
        .seller-info {
            margin-top: 16px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            text-align: left;
        }
        
        .seller-name {
            font-size: 14px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        .seller-category {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 14px;
            color: #4B5563;
        }
        
        .feature-item::before {
            content: "✓";
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="loading">
            <div class="loader"></div>
            <div>Loading product details...</div>
        </div>
    </div>
    
    <script>
        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        const API_BASE_URL = 'https://api.bayna-backend-api.tech/api';
        
        async function loadProduct() {
            if (!productId) {
                showError();
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/products/${productId}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const product = await response.json();
                
                if (!product || !product.id) {
                    showError();
                    return;
                }
                
                renderProduct(product);
                
                setTimeout(() => {
                    window.location.href = `makit://products/${productId}`;
                }, 1000);
                
            } catch (error) {
                console.error('Error loading product:', error);
                showError();
            }
        }
        
        function renderProduct(product) {
            // Handle image URL
            let imageUrl = 'https://contehsaidue.github.io/makit-legal/assets/bayna-white-logo.png';
            
            if (product.images && product.images.length > 0) {
                const img = product.images[0];
                if (img && (img.startsWith('http://') || img.startsWith('https://'))) {
                    imageUrl = img;
                } else if (img && img.startsWith('/')) {
                    imageUrl = `${API_BASE_URL}${img}`;
                }
            }
            
            const price = product.discountedPrice || product.originalPrice || 0;
            const originalPrice = product.originalPrice || price;
            const hasDiscount = product.discountedPrice && product.discountedPrice < originalPrice;
            const rating = product.rating || 0;
            const reviewCount = product.totalReviews || 0;
            const inStock = product.inStock && product.stockQuantity > 0;
            const sellerName = product.seller?.businessName || product.seller?.user?.name || 'Verified Seller';
            const sellerCategory = product.seller?.businessCategory || product.category?.name || 'Product';
            
            // Update page title and meta tags for WhatsApp preview
            document.title = `Bayna - ${product.title}`;
            updateMetaTag('og:title', product.title);
            updateMetaTag('og:description', `Le ${price.toLocaleString()} | ⭐ ${rating}★ (${reviewCount} reviews)`);
            updateMetaTag('og:image', imageUrl);
            updateMetaTag('og:url', `https://contehsaidue.github.io/makit-legal/product.html?id=${productId}`);
            updateMetaTag('twitter:title', product.title);
            updateMetaTag('twitter:description', `Le ${price.toLocaleString()} | ⭐ ${rating}★`);
            updateMetaTag('twitter:image', imageUrl);
            
            // Generate star rating display
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating % 1 >= 0.5;
            let starsHtml = '';
            for (let i = 0; i < fullStars; i++) starsHtml += '<span class="star">★</span>';
            if (hasHalfStar) starsHtml += '<span class="star">½</span>';
            for (let i = 0; i < 5 - Math.ceil(rating); i++) starsHtml += '<span class="star" style="opacity:0.3;">★</span>';
            
            // Stock status class
            const stockClass = inStock ? 'in-stock' : 'out-of-stock';
            const stockText = inStock ? 'In Stock' : 'Out of Stock';
            
            // Render HTML
            document.getElementById('content').innerHTML = `
                <div class="image-container">
                    <img src="${imageUrl}" alt="${escapeHtml(product.title)}" class="product-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                    <div class="default-icon" style="display: none;">🛍️</div>
                </div>
                <div class="content">
                    <h1 class="product-title">${escapeHtml(product.title)}</h1>
                    <div class="product-price">
                        ${hasDiscount ? `<span style="font-size: 16px; color: #999; text-decoration: line-through; margin-right: 8px;">Le ${originalPrice.toLocaleString()}</span>` : ''}
                        Le ${price.toLocaleString()}
                    </div>
                    <div class="product-rating">
                        ${starsHtml}
                        <span style="margin-left: 8px;">${rating}★ (${reviewCount} reviews)</span>
                    </div>
                    
                    <div class="${stockClass}" style="display: inline-block; margin-bottom: 20px;">
                        ${stockText}
                    </div>
                    
                    ${product.description ? `<p style="text-align: left; color: #6B7280; margin-bottom: 20px; line-height: 1.5;">${escapeHtml(product.description.substring(0, 150))}${product.description.length > 150 ? '...' : ''}</p>` : ''}
                    
                    <div class="seller-info">
                        <div class="seller-name">🏪 Seller: ${escapeHtml(sellerName)}</div>
                        <div class="seller-category">📂 Category: ${escapeHtml(sellerCategory)}</div>
                        ${product.brand ? `<div class="seller-category">🏷️ Brand: ${escapeHtml(product.brand)}</div>` : ''}
                        ${product.weight ? `<div class="seller-category">⚖️ Weight: ${product.weight} kg</div>` : ''}
                    </div>
                    
                    <button class="open-button" onclick="openApp()">
                        Open in Bayna App
                    </button>
                    
                    <button class="download-button" onclick="downloadApp()">
                        Download Bayna
                    </button>
                </div>
                <div class="footer">
                    <p>The Unified Marketplace</p>
                    <p style="font-size: 11px; margin-top: 8px;">Buy • Sell & Book Services in Sierra Leone</p>
                </div>
            `;
        }
        
        function openApp() {
            window.location.href = `makit://products/${productId}`;
            
            setTimeout(() => {
                const fallbackMsg = document.createElement('div');
                fallbackMsg.style.cssText = 'position:fixed;bottom:20px;left:20px;right:20px;background:#333;color:white;padding:12px;border-radius:12px;text-align:center;z-index:1000';
                fallbackMsg.innerText = 'Don\'t have Bayna? Tap "Download Bayna" below';
                document.body.appendChild(fallbackMsg);
                setTimeout(() => fallbackMsg.remove(), 3000);
            }, 2000);
        }
        
        function downloadApp() {
            const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            const isAndroid = /Android/.test(navigator.userAgent);
            
            if (isIOS) {
                window.location.href = 'https://apps.apple.com/app/idYOUR_APP_ID';
            } else if (isAndroid) {
                window.location.href = 'https://play.google.com/store/apps/details?id=com.anonymous.makit';
            } else {
                alert('Download Bayna from your device\'s app store');
            }
        }
        
        function updateMetaTag(name, content) {
            let meta = document.querySelector(`meta[property="${name}"]`);
            if (meta) {
                meta.setAttribute('content', content);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showError() {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h2>Product Not Found</h2>
                    <p>This product may have been removed or is no longer available.</p>
                    <button class="download-button" style="margin-top: 20px;" onclick="window.location.href='https://contehsaidue.github.io/makit-legal/'">
                        Visit Bayna
                    </button>
                </div>
            `;
        }
        loadProduct();
    </script>
</body>
</html>
